# Local-dev Postgres for the RepoTracker backend.
# DB name / user / password are env-configurable; defaults suit local dev.
# Connect with: postgresql://<user>:<password>@localhost:5432/<db>
services:
  postgres:
    image: postgres:16
    container_name: repotracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-release_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
